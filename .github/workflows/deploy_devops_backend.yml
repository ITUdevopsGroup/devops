name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

        
on:
  push:
    branches: [ anders/dev]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ anders/dev] 

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: registry.hub.docker.com/andersfrimann
  # github.repository as <account>/<repo>
  IMAGE_NAME: devops_backend



jobs:
  build:

    runs-on: ubuntu-latest
  
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

  - name: File commands
    uses: appleboy/ssh-action@v1
    with:
      host: ec2-13-51-198-31.eu-north-1.compute.amazonaws.com
      username: ubuntu
      key: ${{ secrets.VAGRANT }}
      port: 22
      script: |
        ls -a
        docker login -u andersfrimann -p itudevops
        docker rm $(docker stop $(docker ps -a -q --filter ancestor=registry.hub.docker.com/andersfrimann/devops_backend:anders-dev --format="{{.ID}}"))
        docker image pull registry.hub.docker.com/andersfrimann/devops_backend:anders-dev
        docker run -d -p 5001:5001 registry.hub.docker.com/andersfrimann/devops_backend:anders-dev

