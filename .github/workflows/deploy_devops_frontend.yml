name: deploy_devops_frontend

on:
  push:
    branches: [ anders/dev]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ anders/dev] 

jobs:
  build:

    runs-on: ubuntu-latest
  
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: File commands
        uses: appleboy/ssh-action@v1
        with:
          host: ec2-13-51-198-31.eu-north-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.VAGRANT }}
          port: 22
          script: |
            ls -a
            docker rm $(docker stop $(docker ps -a -q --filter ancestor=registry.hub.docker.com/andersfrimann/devops_frontend:anders-dev --format="{{.ID}}"))
            docker image pull registry.hub.docker.com/andersfrimann/devops_frontend:anders-dev
            docker run -d -p 3000:3000 registry.hub.docker.com/andersfrimann/devops_frontend:anders-dev

