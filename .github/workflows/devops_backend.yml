name: build_and_deploy_devops_backend

on:
  push:
    branches: [main]
    #branches: [alpMerge2]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    #branches: [alpMerge2]

    branches: [main]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: registry.hub.docker.com/andersfrimann
  # github.repository as <account>/<repo>
  IMAGE_NAME: devops_backend

jobs:
  #testing with our test.py and minitwit_sim_api_test.py files which is currently located at the root of out repo
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.8
      - name: Test backend
        working-directory: ./devops_backend
        run: mvn -B test

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start backend (Docker Compose)
        run: docker compose -f docker-compose.ci.yml up -d --build backend

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:5001/ > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not start"
          docker compose -f docker-compose.ci.yml logs backend
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps (if any)
        run: |
          pip install requests

      - name: Run API tests
        run: python test.py

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  build:
    needs: [test-backend, test-api]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: "v2.2.4"

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: registry.hub.docker.com
          username: andersfrimann
          password: itudevops

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./devops_backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  deploy:
    needs: [build, test-backend, test-api]
    if: ${{ success() }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract branch name
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "branch=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | tr / - >> $GITHUB_OUTPUT
          fi
        id: extract_branch

      - name: File commands
        uses: appleboy/ssh-action@v1
        with:
          host: ec2-13-51-198-31.eu-north-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.VAGRANT }}
          port: 22
          script: |
            docker login -u andersfrimann -p itudevops
            set -e

            IMAGE="registry.hub.docker.com/andersfrimann/devops_backend:${{ steps.extract_branch.outputs.branch }}"
            CONTAINER="devops_backend"

            echo "Pulling $IMAGE"
            docker pull "$IMAGE"

            # Stop/remove our named container if it exists
            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            # Stop/remove any container that is currently using host port 5001
            OLD_5001="$(docker ps -q --filter publish=5001)"
            if [ -n "$OLD_5001" ]; then
              docker stop $OLD_5001 || true
              docker rm $OLD_5001 || true
            fi

            # Create volume if missing
            docker volume create minitwit_db >/dev/null

            docker run -d \
              --name "$CONTAINER" \
              -p 5001:5001 \
              -e MINITWIT_DB_PATH=/data/minitwit.db \
              -v minitwit_db:/data \
              --restart unless-stopped \
              "$IMAGE"

            docker ps --filter "name=$CONTAINER"
