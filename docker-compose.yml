services:
  backend:
    build:
      context: ./migration_java
    ports:
      - "ec2-13-60-193-131.eu-north-1.compute.amazonaws.com:5001:5001"

  frontend:
    build:
      context: ./migration_nextjs/minitwit-frontend
    ports:
      - "ec2-13-60-193-131.eu-north-1.compute.amazonaws.com:3001:3001"
    environment:
      NEXT_PUBLIC_API_HOST: "http://ec2-13-60-193-131.eu-north-1.compute.amazonaws.com"
      NEXT_PUBLIC_API_PORT: "5001"
    depends_on:
      - backend