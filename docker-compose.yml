services:
  backend:
    build:
      context: ./migration_java
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./migration_nextjs/minitwit-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_HOST: "ec2-13-60-230-165.eu-north-1.compute.amazonaws.com"
    depends_on:
      - backend