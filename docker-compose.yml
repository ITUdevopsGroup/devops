services:
  backend:
    build:
      context: ./migration_java
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./migration_nextjs/minitwit-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_HOST: "http://localhost"
      NEXT_PUBLIC_API_PORT: "5001"
    depends_on:
      - backend