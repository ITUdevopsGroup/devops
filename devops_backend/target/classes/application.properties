spring.application.name=itu_minitwit
server.port=5001

# --- PostgreSQL datasource (can be overridden via environment variables) ---
spring.datasource.url=${MINITWIT_DB_URL:jdbc:postgresql://localhost:5432/minitwit}
spring.datasource.username=${MINITWIT_DB_USER:postgres}
spring.datasource.password=${MINITWIT_DB_PASSWORD:postgres}

# --- JPA / Hibernate configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable Spring Boot's automatic execution of schema.sql so that
# schema is managed by the ORM instead of raw SQL scripts.
spring.sql.init.mode=never

